<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Countdown to June 24!</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Countdown to June 24</h1>
    <div id="countdown">
      <span id="days">00</span><span class="label">d</span>
      <span id="hours">00</span><span class="label">h</span>
      <span id="minutes">00</span><span class="label">m</span>
      <span id="seconds">00</span><span class="label">s</span>
    </div>
    <p class="note">Excited? The day is coming soon!</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
